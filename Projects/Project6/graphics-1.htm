<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Utah Native Cooking - Graphics</title>

<style type="text/css">


	#thumbs, #image {
		width: 900px;
		text-align: center;
		margin: 0 auto 0 auto;
		color: #000;
	}

	#thumbs {
		margin-top: 10px;
	}

			
	#thumbs img {
		border: solid 1px #000;
		margin: 5px;
	}

	#image
	{
		height:500px;
		text-align: center;
    	margin-top: 20px;
	}

	.instructions{
		font-style:italic;
	}

</style>

<script language="JavaScript" type="text/javascript">

	    var imgArray = new Array(
			'JelloCakeSm.jpg',
			'DutchOvenSm.jpg',
			'ForkSalad.jpg',
			'RasberryIceCreamSm.jpg'
    );
	
		var titleArray = new Array(
			'Jello Cake',
			'Dutch Oven Cooking',
			'Salad',
			'Raspberry Ice Cream'
			
		);
			
		var imgPath = "Images/Fullsize/";
		
		     function swapImage(imgID) 
			{
				var theImage = document.getElementById('theImage');
				var textDiv = document.getElementById('bottomText');

				var newImg = imgArray[imgID];
				theImage.src = imgPath + newImg;

				var textTitle = titleArray[imgID];
				textDiv.innerHTML = textTitle;
			}


    function preloadImages() {
        for (var i = 0; i < imgArray.length; i++) {
            var tmpImg = new Image;
            tmpImg.src = imgPath + imgArray[i];
        }
    }
</script>
		

</script>


</head>
<body  onload="preloadImages()">

<div align="center"></div>

<a href=""
onmouseover="document.getElementById('print').src='Images/print2.jpg';"
onmouseout="document.getElementById('print').src='Images/print1.jpg';">

<img src="Images/print1.jpg" alt="Print Page" width="200" height="50" id="print">
</a>


<div>
<a href=""
onmouseover="document.getElementById('logo').src='Images/logo2.jpg';"
onmouseout="document.getElementById('logo').src='Images/logo1.jpg';">

<img src="Images/logo1.jpg" alt="Logo" id="logo" width="133" height="126">
</a>
</div>

<br />
<br />
<br />
<br />


<div id="thumbs">
    <img src="Images/Thumbnails/CakeSmadjusted.jpg" alt="Jello Cake" onmouseover="swapImage(0);" />
    <img src="Images/Thumbnails/DutchOven.jpg" alt="Dutch Oven Cooking" onmouseover="swapImage(1);" />
    <img src="Images/Thumbnails/ForkSalad.jpg" alt="Raspberry Cake" onmouseover="swapImage(2);" />
    <img src="Images/Thumbnails/RasberryIceCream.jpg" alt="Raspberry Ice Cream" onmouseover="swapImage(3);" />

</div>

<div id="image">
	<img id="theImage" src="Images/Fullsize/JelloCakeSm.jpg" alt="Jello Cake" />
	<h3 id="bottomText">Jello Cake</h3>
</div>

<img src="Images/2colback.jpg">

<br />
<br />
<br />
<br />



</div>

<p>
    <a href="http://validator.w3.org/check?uri=referer"><img
      src="http://www.w3.org/Icons/valid-xhtml10" alt="Valid XHTML 1.0 Transitional" height="31" width="88" /></a>
</p>
  

</body>
</html>
